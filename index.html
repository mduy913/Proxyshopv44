<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MDUY SHOP V44 PROXY</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0b0b12; --cyan: #00f2ff; --gold: #ffcc00; --card: #1a1a2e; --red: #ff3333; --green: #00ff88; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 10px; margin: 0; user-select: none; }
        .box { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #2a2a40; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        button { border: none; padding: 10px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; text-transform: uppercase; font-size: 11px; }
        .btn-main { background: var(--cyan); color: #000; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-adm { background: #333; font-size: 9px; padding: 5px; margin-top: 2px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        table { width:100%; font-size:10px; border-collapse: collapse; }
        td { padding: 8px 4px; border-bottom: 1px solid #222; }
        .st-Success { color: var(--green); } .st-Fail { color: var(--red); } .st-Pending { color: var(--gold); }
    </style>
</head>
<body>
    <div id="msg-box" style="display:none; position:fixed; top:40%; left:50%; transform:translate(-50%,-50%); background:#1a1a2e; border:2px solid var(--cyan); padding:20px; border-radius:15px; z-index:10000; text-align:center; width:80%; max-width:300px; box-shadow:0 0 30px #000;">
        <p id="msg-text"></p>
        <button class="btn-main" onclick="document.getElementById('msg-box').style.display='none'">OK</button>
    </div>

    <div id="auth-box" class="box" style="max-width:380px; margin:40px auto; text-align:center;">
        <h2 style="color: var(--cyan);">SHOP MDUY V43</h2>
        <div id="login-form">
            <input type="text" id="au" placeholder="Tài khoản">
            <input type="password" id="ap" placeholder="Mật khẩu">
            <button class="btn-main" onclick="login()">ĐĂNG NHẬP</button>
            <button style="background:none; color:#777; font-size:11px; margin-top:10px;" onclick="toggleAuth(true)">Đăng ký</button>
        </div>
        <div id="reg-form" style="display:none">
            <input type="text" id="ru" placeholder="Tên tài khoản">
            <input type="password" id="rp" placeholder="Mật khẩu">
            <button class="btn-main" style="background:var(--green)" onclick="register()">TẠO TÀI KHOẢN</button>
            <button style="background:none; color:#777; font-size:11px; margin-top:10px;" onclick="toggleAuth(false)">Quay lại</button>
        </div>
    </div>

    <div id="shop-ui" style="display:none; max-width: 500px; margin: auto;">
        <div id="adm-ctrl" class="box" style="display:none; border: 2px solid var(--red);">
            <h3 style="color:var(--red); margin:0">QUẢN TRỊ VIÊN</h3>
            <div class="grid" style="margin-top:10px">
                <button id="btn-sv" onclick="toggleSV()">...</button>
                <button style="background:var(--green); color:#000" onclick="upPrices()">LƯU GIÁ & RATE</button>
            </div>
            <div class="grid" style="margin-top:10px">
                <input type="number" id="p-ngay" placeholder="Giá Ngày">
                <input type="number" id="p-rate" placeholder="Tỉ lệ % trúng">
            </div>
            <h4 style="margin:10px 0 5px 0; color:var(--cyan)">ĐƠN ĐANG CHỜ (DUYỆT XONG SẼ XOÁ):</h4>
            <div id="adm-pay-list" style="max-height:120px; overflow:auto; background:#000; border-radius:5px; padding:5px;"></div>
            <h4 style="margin:10px 0 5px 0; color:var(--red)">QUẢN LÝ USER:</h4>
            <div id="adm-user-list" style="max-height:120px; overflow:auto; background:#000; border-radius:5px; padding:5px;"></div>
        </div>
        <div id="sv-off" class="box" style="display:none; background:#441111; color:#ffaaaa; text-align:center;">HỆ THỐNG BẢO TRÌ</div>
        <div class="box">
            <span>Sếp: <b id="u-id" style="color:var(--cyan)"></b></span> | Ví: <b id="u-bl" style="color:var(--gold)">0</b>đ
            <input type="number" id="n-amt" placeholder="Số tiền nạp">
            <button class="btn-gold" onclick="nap()">NẠP TIỀN QR</button>
            <div id="qr" style="display:none; text-align:center; margin-top:10px; background:#fff; padding:10px; border-radius:8px;">
                <img id="q-img" style="width:160px;">
                <button class="btn-main" style="margin-top:10px;" onclick="guiDon()">XÁC NHẬN ĐÃ CHUYỂN</button>
            </div>
        </div>
        <div class="box">
            <h4 style="margin:0 0 10px 0; color:var(--gold)">🛒 MUA KEY / RANDOM</h4>
            <div class="grid">
                <div class="box" style="text-align:center; margin:0; padding:10px;">
                    <span style="font-size:10px">KEY NGÀY</span><br>
                    <b id="v-ngay" style="color:var(--cyan)">0</b>đ
                    <button class="btn-main" onclick="buyKey('NGÀY', 'ngay')">MUA</button>
                </div>
                <div class="box" style="text-align:center; margin:0; padding:10px;">
                    <span style="font-size:10px">CHƠI NHÂN PHẨM ĐI EM ZAI</span><br>
                    <b id="v-rate">0</b>% Trúng
                    <button class="btn-gold" onclick="spinRandom()">20K/LƯỢT</button>
                </div>
            </div>
        </div>

        <div class="box">
            <h4>📜 LỊCH SỬ GIAO DỊCH</h4>
            <table><tbody id="h-pay"></tbody></table>
        </div>
    </div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyConfWoy6ZpuW4mgGM8AFBhoyupsWBJnQ0",
        authDomain: "shopmduy.firebaseapp.com",
        databaseURL: "https://shopmduy-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "shopmduy",
        storageBucket: "shopmduy.firebasestorage.app",
        messagingSenderId: "671142246607",
        appId: "1:671142246607:web:816cd666ebf34c999b9fba"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cur = null, curUID = null, isAdmin = false, currentStatus = "Open", currentPrices = {};

    function showMsg(txt) { document.getElementById('msg-text').innerText = txt; document.getElementById('msg-box').style.display = 'block'; }

    db.ref('system/settings').on('value', s => {
        const d = s.val() || {};
        currentStatus = d.status || "Open";
        currentPrices = d.prices || { ngay: 10000, rate: 5 };
        document.getElementById('sv-off').style.display = (currentStatus === 'Closed') ? 'block' : 'none';
        document.getElementById('v-ngay').innerText = currentPrices.ngay.toLocaleString();
        document.getElementById('v-rate').innerText = currentPrices.rate;
        if(isAdmin) {
            document.getElementById('p-ngay').value = currentPrices.ngay;
            document.getElementById('p-rate').value = currentPrices.rate;
            document.getElementById('btn-sv').innerText = currentStatus === 'Open' ? "ĐÓNG SHOP" : "MỞ SHOP";
            document.getElementById('btn-sv').style.background = currentStatus === 'Open' ? "var(--red)" : "var(--green)";
        }
    });

    function login(){
        const u = document.getElementById('au').value.trim().toLowerCase(), p = document.getElementById('ap').value;
        db.ref('users/'+u).once('value', s => {
            const d = s.val();
            if(d && d.password == p){
                cur = u; curUID = d.uid; isAdmin = (d.role === 'admin');
                document.getElementById('auth-box').style.display='none';
                document.getElementById('shop-ui').style.display='block';
                document.getElementById('u-id').innerText = u;
                if(isAdmin) { document.getElementById('adm-ctrl').style.display = 'block'; loadAdminData(); loadUserList(); }
                db.ref('users/'+u+'/balance').on('value', b => document.getElementById('u-bl').innerText = (b.val()||0).toLocaleString());
                loadHistory();
            } else showMsg("Sai thông tin!");
        });
    }

    function nap(){
        const a = document.getElementById('n-amt').value; if(a < 1000) return showMsg("Tối thiểu 1k!");
        document.getElementById('q-img').src = `https://qr.sepay.vn/img?acc=0588807300000&bank=MB&amount=${a}&des=NAP%20${cur}`;
        document.getElementById('qr').style.display='block';
    }

    function guiDon(){
        const amt = Number(document.getElementById('n-amt').value);
        const rid = "NAP" + Date.now();
        const t = new Date().toLocaleTimeString();
        db.ref('bank_requests/'+rid).set({user:cur, uid:curUID, amount:amt, status:'Pending', time:t})
        .then(() => {
            db.ref('history_pay/'+curUID+'/'+rid).set({time:t, amount:amt, status:'Pending'});
            showMsg("✅ ĐƠN ĐÃ GỬI TỚI ADMIN!");
            document.getElementById('qr').style.display = 'none';
        });
    }

    function buyKey(n, t) {
        const p = currentPrices[t];
        db.ref('users/'+cur+'/balance').once('value', s => {
            if((s.val()||0) < p) return showMsg("Hết tiền!");
            db.ref('users/'+cur+'/balance').transaction(b => b - p);
            const k = "MDUY-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            db.ref('history_pay/'+curUID).push({ time: new Date().toLocaleTimeString(), amount: "MUA "+n, status: k });
            showMsg("Xong!");
        });
    }

    function spinRandom() {
        db.ref('users/'+cur+'/balance').once('value', s => {
            if((s.val()||0) < 20000) return showMsg("Cần 20k!");
            db.ref('users/'+cur+'/balance').transaction(b => b - 20000);
            if((Math.random() * 100) <= currentPrices.rate) {
                const k = "WIN-" + Math.random().toString(36).substr(2, 8).toUpperCase();
                db.ref('history_pay/'+curUID).push({ time: new Date().toLocaleTimeString(), amount: "RANDOM", status: k });
                showMsg("ngon luôn");
            } else {
                db.ref('history_pay/'+curUID).push({ time: new Date().toLocaleTimeString(), amount: "RANDOM", status: "HỤT" });
                showMsg("HỤT RỒI!");
            }
        });
    }

    function loadHistory() {
        db.ref('history_pay/'+curUID).on('value', h => {
            const t = document.getElementById('h-pay'); t.innerHTML = "";
            h.forEach(c => { const i = c.val(); t.innerHTML = `<tr><td>${i.time}</td><td>${isNaN(i.amount)?i.amount:i.amount.toLocaleString()+'đ'}</td><td class="st-${i.status}">${i.status}</td></tr>` + t.innerHTML; });
        });
    }
    function loadAdminData() {
        db.ref('bank_requests').on('value', s => {
            const container = document.getElementById('adm-pay-list'); container.innerHTML = "";
            s.forEach(c => {
                const r = c.val();
                container.innerHTML += `<div style="padding:8px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${r.user}</b>: ${r.amount.toLocaleString()}đ</span>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-adm" style="background:var(--green); color:#000; width:50px;" onclick="handlePay('${c.key}','${r.user}','${r.uid}',${r.amount},'Success')">Duyệt</button>
                        <button class="btn-adm" style="background:var(--red); color:#fff; width:50px;" onclick="handlePay('${c.key}','','${r.uid}',0,'Fail')">Hủy</button>
                    </div>
                </div>`;
            });
        });
    }

    function handlePay(id, user, uid, amt, status) {
        if(status === 'Success') db.ref('users/'+user+'/balance').transaction(b => (b || 0) + amt);  db.ref('history_pay/'+uid+'/'+id).update({status: status});
        db.ref('bank_requests/'+id).remove();
    }

    function loadUserList() {
        db.ref('users').on('value', s => {
            const container = document.getElementById('adm-user-list'); container.innerHTML = "";
            s.forEach(c => {
                if(c.key === 'admin') return;
                container.innerHTML += `<div style="padding:5px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                    <span>${c.key} (${Number(c.val().balance).toLocaleString()}đ)</span>
                    <button class="btn-adm" style="color:var(--red); width:40px;" onclick="if(confirm('Xoá user ${c.key}?')) db.ref('users/${c.key}').remove()">khai tử</button>
                </div>`;
            });
        });
    }

    function upPrices() {
        db.ref('system/settings/prices').set({ ngay: Number(document.getElementById('p-ngay').value), rate: Number(document.getElementById('p-rate').value) })
        .then(() => showMsg("ĐÃ LƯU!"));
    }

    function register() {
        const u = document.getElementById('ru').value.trim().toLowerCase(), p = document.getElementById('rp').value;
        if(!u || !p) return showMsg("Điền đủ thông tin!");
        db.ref('users/'+u).once('value', sn => {
            if(sn.exists()) return showMsg("Tên này có người dùng rồi!");
            db.ref('users/'+u).set({password: p, balance: 0, role: 'user', uid: "U"+Date.now()}).then(() => { showMsg("Đăng ký xong!"); login(); });
        });
    }
    function toggleAuth(r) { document.getElementById('login-form').style.display = r?'none':'block'; document.getElementById('reg-form').style.display = r?'block':'none'; }
    function toggleSV() { db.ref('system/settings/status').set(currentStatus === 'Open' ? 'Closed' : 'Open'); }
</script>
</body>
</html>
